version: "3.9"
services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: stockplatform
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - "8000:8000"
    env_file: ../backend/.env
    depends_on: [db]
    volumes:
      - ../backend:/app

  worker:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.worker
    env_file: ../backend/.env
    depends_on: [db, backend]
    volumes:
      - ../backend:/app

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    ports:
      - "5173:5173"
    depends_on: [backend]
    volumes:
      - ../frontend:/app
      - /app/node_modules

volumes:
  pgdata:
